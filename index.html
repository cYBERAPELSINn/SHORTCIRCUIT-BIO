<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHORTCIRCUIT | Portfolio</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #ff6600; /* Тот самый оранжевый */
            --text-main: #ffffff;
            --text-dim: #888888;
            --glow: rgba(255, 102, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Фоновый эффект сетки */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--card-bg) 1px, transparent 1px), linear-gradient(90deg, var(--card-bg) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.2;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            color: var(--accent);
            text-shadow: 0 0 20px var(--glow);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .nicknames {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        /* Переключатели */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid #333;
            color: var(--text-dim);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn.active {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 10px var(--glow);
        }

        /* Контентные карточки */
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 15px;
            text-align: left;
            margin-bottom: 15px;
        }

        .info-item { margin-bottom: 15px; }
        .info-label { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 3px; }
        .info-value { font-size: 1.1rem; }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            margin-bottom: 10px;
            border-left: 3px solid transparent;
            transition: 0.3s;
        }

        .social-link:hover {
            border-left-color: var(--accent);
            background: #222;
            transform: translateX(5px);
        }

        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
        }

        .divider {
            height: 1px;
            background: #333;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="btn active" id="btn-ru" onclick="setLang('ru')">RU</button>
        <button class="btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <div class="header">
            <h1>ShortCircuit</h1>
            <div class="nicknames">Sh0rtC1rQUIT / CYBERAPELSIN</div>
        </div>

        <div class="controls">
            <button class="btn active" id="tab-about-btn" onclick="showTab('about')">ABOUT</button>
            <button class="btn" id="tab-socials-btn" onclick="showTab('socials')">SOCIALS</button>
        </div>

        <div id="about" class="tab-content active">
            <div class="card">
                <div class="info-item">
                    <span class="info-label" data-ru="Имя" data-en="Name">Имя</span>
                    <span class="info-value">Karim Arslanov</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-ru="Локация" data-en="Location">Локация</span>
                    <span class="info-value" data-ru="Россия, Казань" data-en="Russia, Kazan">Россия, Казань</span>
                </div>
                <div class="divider"></div>
                <div class="info-item">
                    <span class="info-label" data-ru="Железо" data-en="Hardware">Железо</span>
                    <span class="info-value">Pixel 10 Pro | XiaoXin 14 Pro</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-ru="Стек" data-en="Stack">Стек</span>
                    <span class="info-value">Arduino, ESP32, IoT, КОМПАС-3D</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-ru="Проекты" data-en="Projects">Проекты</span>
                    <span class="info-value" data-ru="ЧПУ станок для ПП, FPV дроны (Meteor 75 Pro)" data-en="PCB CNC Machine, FPV Drones (Meteor 75 Pro)">ЧПУ станок для ПП, FPV дроны (Meteor 75 Pro)</span>
                </div>
            </div>
        </div>

        <div id="socials" class="tab-content">
            <a href="https://t.me/short_circu1T" class="social-link" target="_blank">
                <span>Telegram (Personal)</span>
                <span style="color: var(--accent);">@short_circu1T</span>
            </a>
            <a href="https://t.me/short_cirquit" class="social-link" target="_blank">
                <span>Main TG Channel</span>
                <span style="color: var(--accent);">Join →</span>
            </a>
            <a href="https://tiktok.com/@short_cirquit" class="social-link" target="_blank">
                <span>TikTok</span>
                <span style="color: var(--accent);">@short_cirquit</span>
            </a>
            <a href="https://steamcommunity.com/id/shortcircuit" class="social-link" target="_blank">
                <span>Steam</span>
                <span>🎮</span>
            </a>
        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId + '-btn').classList.add('active');
        }

        function setLang(lang) {
            document.querySelectorAll('#btn-ru, #btn-en').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            
            document.querySelectorAll('[data-ru]').forEach(el => {
                el.innerText = el.getAttribute('data-' + lang);
            });
        }
    </script>
</body>
</html>
